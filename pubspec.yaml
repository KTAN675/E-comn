name: e_comm
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.3
  google_fonts: ^6.3.2
  http: ^1.6.0
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  permission_handler: ^12.0.1
  image_picker: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

# Launcher Icon Configuration
flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/splash/
    - assets/images/onboarding/
    - assets/images/auth/
    - assets/images/icons/
    - assets/images/medicine/
    - assets/images/icons/medical/
    - assets/images/products/
    - assets/images/dashboard/
    - assets/images/wallet/